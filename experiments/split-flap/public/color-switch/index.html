<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color-Switch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <style>
    :root { --bg: #0a0a0a; --fg: #ccc; --dim: #555; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden; height: 100vh;
    }

    canvas#glow {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }
    #cy {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1; background: transparent;
    }
    .hud { position: fixed; z-index: 2; pointer-events: none; }
    .hud-top {
      top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }
    .hud-bottom {
      bottom: 0; left: 0; right: 0;
      padding: 14px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; justify-content: space-between; align-items: center;
    }
    .hud-title { font-size: 14px; letter-spacing: 3px; color: rgba(255,255,255,0.3); }
    .hud-metrics { display: flex; gap: 20px; }
    .hud-metric .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.2); }
    .hud-metric .value { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 1px; }
    .hud-hint { font-size: 10px; color: rgba(255,255,255,0.15); }
    .state-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .state-healthy  { color: rgba(46,204,113,0.5); }
    .state-busy     { color: rgba(241,196,15,0.5); }
    .state-critical { color: rgba(231,76,60,0.6); }

    .mode-indicator {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 3; pointer-events: none;
      display: flex; gap: 6px; align-items: center;
    }
    .mode-pip {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.3s, transform 0.3s;
    }
    .mode-pip.active {
      background: rgba(255,255,255,0.6);
      transform: scale(1.4);
    }
    .mode-label {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-left: 10px;
    }

    .legend {
      position: fixed; bottom: 50px; right: 24px;
      z-index: 3; pointer-events: none;
      display: flex; flex-direction: column; gap: 4px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .legend.visible { opacity: 1; }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 9px; color: rgba(255,255,255,0.3);
    }
    .legend-swatch {
      width: 8px; height: 8px; border-radius: 2px;
      flex-shrink: 0;
    }

    .project-label {
      position: fixed; z-index: 3; pointer-events: none;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      white-space: nowrap;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <canvas id="glow"></canvas>
  <div id="cy"></div>

  <div class="hud hud-top">
    <div class="hud-title">COLOR-SWITCH</div>
    <div class="hud-metrics">
      <div class="hud-metric"><div class="label">Agents</div><div class="value" id="m-agents">0</div></div>
      <div class="hud-metric"><div class="label">Active</div><div class="value" id="m-active">0</div></div>
      <div class="hud-metric"><div class="label">Beads</div><div class="value" id="m-beads">0</div></div>
    </div>
  </div>

  <div class="mode-indicator" id="mode-indicator">
    <div class="mode-pip active" data-mode="0"></div>
    <div class="mode-pip" data-mode="1"></div>
    <div class="mode-pip" data-mode="2"></div>
    <div class="mode-pip" data-mode="3"></div>
    <div class="mode-label" id="mode-label">STATUS</div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="hud hud-bottom">
    <div><span class="state-label" id="state-label">HEALTHY</span></div>
    <div class="hud-hint">Tab cycle color mode · Click node to trace · Dblclick reset</div>
  </div>

  <script type="module">
    import { DataPipe } from '../data-static/data-pipe.js';

    // =========================================
    // COLOR ENCODING MODES
    // =========================================

    var COLOR_MODES = [
      {
        name: 'STATUS', key: 'status',
        agentColors: { idle: '#444', dispatching: '#3498db', executing: '#2ecc71', blocked: '#e74c3c', gated: '#f39c12', shipped: '#1a7a7a' },
        beadColors: { open: '#3498db', in_progress: '#2ecc71', blocked: '#e74c3c' },
        glowColors: {
          idle: { r:60,g:60,b:60 }, dispatching: { r:52,g:120,b:210 }, executing: { r:46,g:190,b:100 },
          blocked: { r:220,g:60,b:50 }, gated: { r:230,g:150,b:30 }, shipped: { r:40,g:130,b:130 },
        },
        legend: [
          { color: '#444', label: 'Idle' }, { color: '#3498db', label: 'Dispatching' },
          { color: '#2ecc71', label: 'Executing' }, { color: '#e74c3c', label: 'Blocked' }, { color: '#f39c12', label: 'Gated' },
        ],
      },
      {
        name: 'THEME', key: 'theme',
        themeColors: { core: '#e74c3c', os: '#3498db', apps: '#2ecc71', plugins: '#9b59b6', sdk: '#e67e22', infra: '#1abc9c' },
        legend: [
          { color: '#e74c3c', label: 'Core' }, { color: '#3498db', label: 'OS' },
          { color: '#2ecc71', label: 'Apps' }, { color: '#9b59b6', label: 'Plugins' }, { color: '#e67e22', label: 'SDK' },
        ],
      },
      {
        name: 'AGENT TYPE', key: 'agentType',
        typeColors: { claude: '#3498db', codex: '#2ecc71', gemini: '#f39c12' },
        legend: [
          { color: '#3498db', label: 'Claude' }, { color: '#2ecc71', label: 'Codex' }, { color: '#f39c12', label: 'Gemini' },
        ],
      },
      {
        name: 'PRIORITY', key: 'priority',
        priorityColors: { P0: '#e74c3c', P1: '#f39c12', P2: '#3498db', P3: '#555' },
        legend: [
          { color: '#e74c3c', label: 'P0 Critical' }, { color: '#f39c12', label: 'P1 High' },
          { color: '#3498db', label: 'P2 Normal' }, { color: '#555', label: 'P3 Low' },
        ],
      },
    ];

    var currentMode = 0;
    var transitionProgress = 1;
    var prevColors = new Map();
    var targetColors = new Map();

    // =========================================
    // PROJECT CONSTELLATION
    // =========================================

    var LAYER_Y = { L1: 0.78, L2: 0.50, L3: 0.22 };

    var PILLAR_PROJECTS = [
      { id: 'intercore', label: 'Intercore', layer: 'L1', x: 0.30, theme: 'core' },
      { id: 'intermute', label: 'Intermute', layer: 'L1', x: 0.50, theme: 'core' },
      { id: 'interweave', label: 'Interweave', layer: 'L1', x: 0.70, theme: 'core' },
      { id: 'interband', label: 'Interband', layer: 'L1', x: 0.15, theme: 'core' },
      { id: 'interbase', label: 'Interbase', layer: 'L1', x: 0.85, theme: 'sdk' },
      { id: 'clavain', label: 'Clavain', layer: 'L2', x: 0.35, theme: 'os' },
      { id: 'skaffen', label: 'Skaffen', layer: 'L2', x: 0.65, theme: 'os' },
      { id: 'zaka', label: 'Zaka', layer: 'L2', x: 0.20, theme: 'os' },
      { id: 'alwe', label: 'Alwe', layer: 'L2', x: 0.80, theme: 'os' },
      { id: 'ockham', label: 'Ockham', layer: 'L2', x: 0.50, theme: 'os' },
      { id: 'interspect', label: 'Interspect', layer: 'L2', x: 0.90, theme: 'os' },
      { id: 'autarch', label: 'Autarch', layer: 'L3', x: 0.30, theme: 'apps' },
      { id: 'meadowsyn', label: 'Meadowsyn', layer: 'L3', x: 0.50, theme: 'apps' },
      { id: 'intercom', label: 'Intercom', layer: 'L3', x: 0.70, theme: 'apps' },
      { id: 'khouri', label: 'Khouri', layer: 'L3', x: 0.15, theme: 'apps' },
    ];

    var INTERVERSE_PLUGINS = [
      'intercache','interchart','intercheck','intercraft','interdeep','interdev',
      'interdoc','interfluence','interflux','interform','interhelm','interject',
      'interkasten','interknow','interlab','interlearn','interleave','interlens',
      'interline','interlock','interlore','intermap','intermem','intermix',
      'intermonk','intermux','intername','internext','interpath','interpeer',
      'interphase','interplug','interpub','interpulse','interrank','interscribe',
      'intersearch','intersense','intership','intersight','interskill','interslack',
      'interstat','intersynth','intertest','intertrace','intertrack','intertree',
      'intertrust','interwatch','tldr-swinton','tool-time','tuivision',
    ];

    function computeInterversePositions() {
      var result = [];
      var n = INTERVERSE_PLUGINS.length;
      for (var i = 0; i < n; i++) {
        var angle = (2 * Math.PI * i / n) - Math.PI / 2;
        result.push({ id: INTERVERSE_PLUGINS[i], label: INTERVERSE_PLUGINS[i], layer: 'IV', theme: 'plugins',
          x: 0.50 + 0.44 * Math.cos(angle), y: 0.50 + 0.40 * Math.sin(angle) });
      }
      return result;
    }

    function getAllProjects() {
      var all = [];
      PILLAR_PROJECTS.forEach(function(p) {
        all.push({ id: p.id, label: p.label, layer: p.layer, theme: p.theme, nx: p.x, ny: LAYER_Y[p.layer] });
      });
      computeInterversePositions().forEach(function(p) {
        all.push({ id: p.id, label: p.label, layer: 'IV', theme: p.theme, nx: p.x, ny: p.y });
      });
      return all;
    }

    var ALL_PROJECTS = getAllProjects();
    var PROJECT_MAP = new Map();
    ALL_PROJECTS.forEach(function(p) { PROJECT_MAP.set(p.id, p); });

    function projectPosition(p, vW, vH) {
      var pad = 80;
      return { x: pad + p.nx * (vW - 2 * pad), y: pad + p.ny * (vH - 2 * pad) };
    }

    // =========================================
    // L1: AMBIENT GLOW CANVAS
    // =========================================

    var glowCanvas = document.getElementById('glow');
    var glowCtx = glowCanvas.getContext('2d');
    var W, H, dpr;
    var GLOW_INTENSITY = { idle: 0.02, dispatching: 0.08, executing: 0.03, blocked: 0.35, gated: 0.28, shipped: 0.04 };
    var GLOW_RADIUS = 120;
    var glowTextures = {};
    var glowNodes = new Map();

    function initGlowTextures() {
      var gc = COLOR_MODES[0].glowColors;
      var size = GLOW_RADIUS * 2;
      Object.keys(gc).forEach(function(status) {
        var c = gc[status];
        var off = document.createElement('canvas');
        off.width = size; off.height = size;
        var ctx = off.getContext('2d');
        var grad = ctx.createRadialGradient(GLOW_RADIUS, GLOW_RADIUS, 0, GLOW_RADIUS, GLOW_RADIUS, GLOW_RADIUS);
        grad.addColorStop(0, 'rgba('+c.r+','+c.g+','+c.b+',1)');
        grad.addColorStop(0.4, 'rgba('+c.r+','+c.g+','+c.b+',0.4)');
        grad.addColorStop(1, 'rgba('+c.r+','+c.g+','+c.b+',0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        glowTextures[status] = off;
      });
    }

    function resizeGlow() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth; H = window.innerHeight;
      var scale = 0.5;
      glowCanvas.width = W * dpr * scale; glowCanvas.height = H * dpr * scale;
      glowCanvas.style.width = W + 'px'; glowCanvas.style.height = H + 'px';
      glowCtx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function drawGlow() {
      glowCtx.clearRect(0, 0, W, H);
      glowNodes.forEach(function(g) {
        if (g.intensity < 0.008) return;
        var tex = glowTextures[g.status] || glowTextures.idle;
        if (!tex) return;
        glowCtx.globalAlpha = g.intensity;
        glowCtx.drawImage(tex, g.x - g.radius, g.y - g.radius, g.radius * 2, g.radius * 2);
      });
      glowCtx.globalAlpha = 1;
    }

    function syncGlow() {
      if (!cy) return;
      cy.nodes('[type != "anchor"]').forEach(function(node) {
        var id = node.id();
        var pos = node.renderedPosition();
        var status = node.data('status') || 'idle';
        var ti = GLOW_INTENSITY[status] || GLOW_INTENSITY.idle;
        var isBead = node.data('type') === 'bead';
        ti = isBead ? ti * 0.4 : ti;
        var tr = isBead ? GLOW_RADIUS * 0.5 : GLOW_RADIUS;
        var g = glowNodes.get(id);
        if (!g) { g = { x: pos.x, y: pos.y, radius: tr, intensity: 0, status: status }; glowNodes.set(id, g); }
        g.x = lerp(g.x, pos.x, 0.2); g.y = lerp(g.y, pos.y, 0.2);
        g.intensity = lerp(g.intensity, ti, 0.08); g.radius = lerp(g.radius, tr, 0.08);
        g.status = status;
      });
      glowNodes.forEach(function(_, id) { if (!cy.getElementById(id).length) glowNodes.delete(id); });
    }

    function animateGlow() {
      syncGlow(); drawGlow();
      if (transitionProgress < 1) {
        transitionProgress = Math.min(1, transitionProgress + 0.04);
        applyColorTransition();
      }
      requestAnimationFrame(animateGlow);
    }

    // =========================================
    // COLOR MODE SWITCHING
    // =========================================

    function getNodeColor(node, modeIdx) {
      var mode = COLOR_MODES[modeIdx];
      var type = node.data('type');
      if (mode.key === 'status') {
        if (type === 'agent') return mode.agentColors[node.data('status')] || mode.agentColors.idle;
        return mode.beadColors[node.data('beadStatus') || node.data('status')] || mode.beadColors.open;
      }
      if (mode.key === 'theme') {
        var proj = node.data('project');
        var pd = PROJECT_MAP.get(proj);
        return mode.themeColors[pd ? pd.theme : 'plugins'] || '#555';
      }
      if (mode.key === 'agentType') return mode.typeColors[node.data('agentType') || 'claude'] || '#555';
      if (mode.key === 'priority') return mode.priorityColors[node.data('priority') || 'P2'] || '#555';
      return '#555';
    }

    function hexToRgb(hex) {
      return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    }
    function rgbToHex(r, g, b) {
      return '#' + [r,g,b].map(function(c) { var h = Math.round(c).toString(16); return h.length<2?'0'+h:h; }).join('');
    }
    function lerpColor(h1, h2, t) {
      var a = hexToRgb(h1), b = hexToRgb(h2);
      return rgbToHex(lerp(a.r,b.r,t), lerp(a.g,b.g,t), lerp(a.b,b.b,t));
    }

    function applyColorTransition() {
      if (!cy) return;
      cy.nodes('[type != "anchor"]').forEach(function(node) {
        var id = node.id();
        var prev = prevColors.get(id) || '#555';
        var target = targetColors.get(id) || '#555';
        node.data('color', transitionProgress >= 1 ? target : lerpColor(prev, target, transitionProgress));
      });
    }

    function switchMode(newMode) {
      if (newMode === currentMode && transitionProgress >= 1) return;
      if (cy) {
        cy.nodes('[type != "anchor"]').forEach(function(node) {
          prevColors.set(node.id(), node.data('color') || '#555');
        });
      }
      currentMode = newMode;
      transitionProgress = 0;
      if (cy) {
        cy.nodes('[type != "anchor"]').forEach(function(node) {
          targetColors.set(node.id(), getNodeColor(node, currentMode));
        });
      }
      var pips = document.querySelectorAll('.mode-pip');
      pips.forEach(function(pip, i) { pip.classList.toggle('active', i === currentMode); });
      document.getElementById('mode-label').textContent = COLOR_MODES[currentMode].name;
      updateLegend();
    }

    function updateLegend() {
      var legendEl = document.getElementById('legend');
      // Clear existing children safely
      while (legendEl.firstChild) legendEl.removeChild(legendEl.firstChild);
      var mode = COLOR_MODES[currentMode];
      (mode.legend || []).forEach(function(item) {
        var row = document.createElement('div');
        row.className = 'legend-item';
        var swatch = document.createElement('div');
        swatch.className = 'legend-swatch';
        swatch.style.background = item.color;
        var label = document.createElement('span');
        label.textContent = item.label;
        row.appendChild(swatch);
        row.appendChild(label);
        legendEl.appendChild(row);
      });
      legendEl.classList.add('visible');
      clearTimeout(legendEl._fadeTimer);
      legendEl._fadeTimer = setTimeout(function() { legendEl.classList.remove('visible'); }, 3000);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') { e.preventDefault(); switchMode((currentMode + 1) % COLOR_MODES.length); }
    });

    // =========================================
    // PROJECT LABELS
    // =========================================

    var projectLabelEls = new Map();
    function createProjectLabels() {
      PILLAR_PROJECTS.forEach(function(proj) {
        var el = document.createElement('div');
        el.className = 'project-label';
        el.textContent = proj.label;
        document.body.appendChild(el);
        projectLabelEls.set(proj.id, el);
      });
    }
    function updateProjectLabels() {
      PILLAR_PROJECTS.forEach(function(proj) {
        var el = projectLabelEls.get(proj.id);
        if (!el) return;
        var pos = projectPosition(proj, W, H);
        el.style.left = pos.x + 'px'; el.style.top = (pos.y - 50) + 'px';
      });
    }

    // =========================================
    // L2: CYTOSCAPE GRAPH
    // =========================================

    var cy;
    function initCytoscape() {
      if (window.cytoscapeFcose && typeof cytoscape !== 'undefined') {
        try { var exts = cytoscape.extensions(); if (!(exts && exts.layout && exts.layout.fcose)) cytoscape.use(window.cytoscapeFcose); } catch(e){}
      }
      cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
          { selector: 'node[type="anchor"]', style: { 'width':1,'height':1,'opacity':0,'label':'','events':'no' } },
          { selector: 'node[type="agent"]', style: {
            'shape':'ellipse','label':'data(label)','text-valign':'bottom','text-halign':'center',
            'font-size':'9px','font-family':'JetBrains Mono, monospace','color':'rgba(255,255,255,0.5)',
            'text-margin-y':6,'text-outline-color':'rgba(0,0,0,0.8)','text-outline-width':2,
            'background-color':'data(color)','width':'data(size)','height':'data(size)',
            'border-width':1.5,'border-color':'rgba(255,255,255,0.12)','overlay-opacity':0,
          }},
          { selector: 'node[type="bead"]', style: {
            'shape':'round-rectangle','label':'data(label)','text-valign':'bottom','text-halign':'center',
            'font-size':'8px','font-family':'JetBrains Mono, monospace','color':'rgba(255,255,255,0.35)',
            'text-margin-y':6,'text-outline-color':'rgba(0,0,0,0.8)','text-outline-width':2,
            'background-color':'data(color)','width':'data(size)','height':'mapData(size, 20, 40, 14, 28)',
            'border-width':0,'overlay-opacity':0,
          }},
          { selector: 'edge[type="anchor"]', style: { 'opacity':0,'events':'no' } },
          { selector: 'edge[type="works-on"]', style: {
            'line-color':'rgba(255,255,255,0.07)','target-arrow-color':'rgba(255,255,255,0.07)',
            'target-arrow-shape':'triangle','curve-style':'bezier','width':1.5,'arrow-scale':0.7,'overlay-opacity':0,
          }},
          { selector: 'edge[type="depends-on"]', style: {
            'line-color':'rgba(100,120,200,0.08)','line-style':'dashed',
            'target-arrow-color':'rgba(100,120,200,0.08)','target-arrow-shape':'triangle',
            'curve-style':'bezier','width':1,'arrow-scale':0.6,'overlay-opacity':0,
          }},
          { selector: '.highlighted', style: { 'opacity':1,'z-index':10 } },
          { selector: '.dimmed', style: { 'opacity':0.08 } },
          { selector: 'edge.highlighted[type="works-on"]', style: {
            'line-color':'rgba(46,204,113,0.6)','target-arrow-color':'rgba(46,204,113,0.6)','width':2.5,
          }},
        ],
        layout: { name: 'preset' },
        minZoom: 0.3, maxZoom: 3, wheelSensitivity: 0.3,
      });
      cy.on('tap', 'node[type != "anchor"]', function(evt) {
        var node = evt.target; cy.elements().addClass('dimmed');
        var hood = node.neighborhood().add(node);
        if (node.data('type') === 'bead') hood = hood.merge(node.successors()).merge(node.predecessors());
        hood.filter('[type != "anchor"]').removeClass('dimmed').addClass('highlighted');
      });
      cy.on('tap', function(evt) { if (evt.target === cy) cy.elements().removeClass('dimmed highlighted'); });
      cy.on('dbltap', function() { cy.elements().removeClass('dimmed highlighted'); });

      var anchors = [];
      ALL_PROJECTS.forEach(function(proj) {
        anchors.push({ data: { id: 'anchor-'+proj.id, type: 'anchor', project: proj.id }, position: projectPosition(proj, W, H) });
      });
      cy.add(anchors);
    }

    // =========================================
    // MOCK DATA
    // =========================================

    var SHIPS = [
      'Mistake Not','Grey Area','Falling Outside','Sleeper Service',
      'Just Read Instr.','Still Love You','So Much Subtlety','No Gravitas',
      'Gravitas Shortfall','Honest Mistake','No More Nice Guy','Quietly Confident',
      'Sense Amid Madness','Profit Margin','Limiting Factor','Conflict Evidence',
      'Ethics Gradient','Xenophobe','Anticipation of Calm','Experiencing Sig.',
      'Serious Callers Only','Orbital Delight','Absence of Blade','Not Invented Here',
    ];
    var AGENT_TYPES = ['claude','claude','codex','claude','claude','gemini','claude','codex',
      'claude','claude','codex','claude','gemini','claude','claude','claude',
      'codex','claude','claude','gemini','claude','codex','claude','claude'];

    var AGENT_PROJECTS = new Map();
    SHIPS.forEach(function(name, i) {
      if (i < 4) AGENT_PROJECTS.set(name, ['clavain','skaffen','ockham','zaka'][i]);
      else if (i < 8) AGENT_PROJECTS.set(name, ['intercore','intermute','interweave','interbase'][i-4]);
      else if (i < 11) AGENT_PROJECTS.set(name, ['autarch','meadowsyn','intercom'][i-8]);
      else AGENT_PROJECTS.set(name, INTERVERSE_PLUGINS[(i-11)%INTERVERSE_PLUGINS.length]);
    });

    var BEADS = [], BEAD_PROJECTS = new Map();
    var titles = ['Auth refactor','Config migration','Test coverage','API endpoint','Cache layer',
      'Error handling','Logging pipeline','Metrics export','Deploy pipeline','Schema update',
      'Data export','Search index','Plugin scaffold','Hook validation','Session replay',
      'Token budget','MCP integration','Voice profile','Skill audit','Graph render'];
    var prios = ['P0','P0','P0','P1','P1','P1','P1','P1','P2','P2','P2','P2','P2','P2','P2','P3','P3','P3','P3','P3'];
    for (var i = 0; i < 20; i++) {
      var bid = 'Demarch-' + (1000+i).toString(36);
      BEADS.push({ id: bid, title: titles[i], priority: prios[i], status: Math.random()<0.4?'in_progress':'open' });
      var pk = Array.from(PROJECT_MAP.keys());
      BEAD_PROJECTS.set(bid, pk[i % pk.length]);
    }
    var BEAD_DEPS = [[BEADS[1].id,BEADS[0].id],[BEADS[3].id,BEADS[2].id],[BEADS[5].id,BEADS[0].id],[BEADS[7].id,BEADS[6].id]];
    var STATUSES = ['idle','dispatching','executing','blocked','gated'];
    var STATUS_W = [0.35,0.10,0.35,0.08,0.07];
    function wRand(w) { var r=Math.random(),a=0; for(var i=0;i<w.length;i++){a+=w[i];if(r<a)return i;} return w.length-1; }

    var ASSIGN = new Map();
    SHIPS.forEach(function(name) {
      var n = Math.random()<0.3?0:Math.random()<0.5?1:2;
      var bs = [];
      for (var j=0;j<n;j++) { var b=BEADS[Math.floor(Math.random()*BEADS.length)].id; if(bs.indexOf(b)<0)bs.push(b); }
      ASSIGN.set(name, bs);
    });
    var agentStates = new Map();

    function generateSnapshot() {
      var agents = SHIPS.map(function(name, idx) {
        var s = agentStates.get(name) || 'idle';
        if (Math.random() < 0.12) s = STATUSES[wRand(STATUS_W)];
        agentStates.set(name, s);
        return { agent: name, status: s, beads: ASSIGN.get(name)||[], project: AGENT_PROJECTS.get(name)||'clavain', agentType: AGENT_TYPES[idx]||'claude' };
      });
      var total = agents.length, active = agents.filter(function(a){return a.status!=='idle';}).length;
      var blocked = agents.filter(function(a){return a.status==='blocked';}).length;
      return {
        timestamp: new Date().toISOString(),
        fleet: { total: total, active: active, agents: agents },
        beads: BEADS, bead_deps: BEAD_DEPS,
        bead_projects: Object.fromEntries(BEAD_PROJECTS),
        metrics: { utilization: active/total, errorRate: blocked/Math.max(active,1) },
      };
    }

    // =========================================
    // DATA -> GRAPH
    // =========================================

    var firstUpdate = true, layoutPending = false, knownNodeIds = new Set();

    function applySnapshot(snap) {
      if (!snap || !cy) return;
      var m = snap.metrics || {};
      document.getElementById('m-agents').textContent = String(snap.fleet.total);
      document.getElementById('m-active').textContent = String(snap.fleet.active);
      document.getElementById('m-beads').textContent = String((snap.beads||[]).length);
      var state = (m.errorRate||0) > 0.3 ? 'critical' : (m.utilization||0) > 0.7 ? 'busy' : 'healthy';
      var sl = document.getElementById('state-label');
      sl.textContent = state.toUpperCase(); sl.className = 'state-label state-' + state;

      var toAdd = [], newIds = new Set();

      snap.fleet.agents.forEach(function(agent) {
        var id = 'a-' + agent.agent.replace(/[^a-z0-9]/gi, '_');
        newIds.add(id);
        var proj = agent.project || 'clavain';
        var ex = cy.getElementById(id);
        if (ex.length) {
          ex.data('status', agent.status);
          ex.data('size', agent.status === 'idle' ? 16 : 24);
          ex.data('color', getNodeColor(ex, currentMode));
        } else {
          var pd = PROJECT_MAP.get(proj);
          var ap = pd ? projectPosition(pd, W, H) : { x: W/2, y: H/2 };
          toAdd.push({
            data: { id: id, label: agent.agent, type: 'agent', color: '#555', size: agent.status==='idle'?16:24,
              status: agent.status, project: proj, agentType: agent.agentType||'claude', priority: 'P2' },
            position: { x: ap.x+(Math.random()-0.5)*60, y: ap.y+(Math.random()-0.5)*60 },
          });
          toAdd.push({ data: { id: 'anc-'+id, source: id, target: 'anchor-'+proj, type: 'anchor', weight: 8 } });
          layoutPending = true;
        }
        (agent.beads||[]).forEach(function(bid) {
          var eid = id+'->'+bid;
          if (!cy.getElementById(eid).length) toAdd.push({ data: { id: eid, source: id, target: bid, type: 'works-on' } });
        });
      });

      var bp = snap.bead_projects || {};
      (snap.beads||[]).forEach(function(b) {
        newIds.add(b.id);
        var proj = bp[b.id]||'clavain';
        var sz = b.priority==='P0'?36:b.priority==='P1'?26:18;
        var ex = cy.getElementById(b.id);
        if (ex.length) {
          ex.data('beadStatus', b.status); ex.data('status', b.status); ex.data('size', sz);
          ex.data('color', getNodeColor(ex, currentMode));
        } else {
          var pd = PROJECT_MAP.get(proj);
          var ap = pd ? projectPosition(pd, W, H) : { x: W/2, y: H/2 };
          toAdd.push({
            data: { id: b.id, label: b.id, type: 'bead', color: '#555', size: sz,
              beadStatus: b.status, status: b.status, project: proj, priority: b.priority, agentType: 'claude' },
            position: { x: ap.x+(Math.random()-0.5)*40, y: ap.y+(Math.random()-0.5)*40 },
          });
          toAdd.push({ data: { id: 'anc-'+b.id, source: b.id, target: 'anchor-'+proj, type: 'anchor', weight: 5 } });
          layoutPending = true;
        }
      });

      (snap.bead_deps||[]).forEach(function(d) {
        var eid = 'dep-'+d[0]+'->'+d[1];
        if (!cy.getElementById(eid).length) toAdd.push({ data: { id: eid, source: d[0], target: d[1], type: 'depends-on' } });
      });

      knownNodeIds.forEach(function(id) {
        if (!newIds.has(id) && cy.getElementById(id).length) { cy.remove(cy.getElementById(id)); layoutPending = true; }
      });
      knownNodeIds = newIds;

      if (toAdd.length) {
        cy.add(toAdd);
        toAdd.forEach(function(el) {
          if (el.data && el.data.type && el.data.type !== 'anchor' && !el.data.source) {
            var node = cy.getElementById(el.data.id);
            if (node.length) node.data('color', getNodeColor(node, currentMode));
          }
        });
      }
      if (layoutPending) { runLayout(); layoutPending = false; }
    }

    // =========================================
    // fCoSE LAYOUT
    // =========================================

    function runLayout() {
      var fixed = [];
      ALL_PROJECTS.forEach(function(proj) { fixed.push({ nodeId: 'anchor-'+proj.id, position: projectPosition(proj, W, H) }); });
      var hasFcose = false;
      try { var exts = cytoscape.extensions(); hasFcose = !!(exts && exts.layout && exts.layout.fcose); } catch(e){}
      var opts = hasFcose ? {
        name: 'fcose', animate: !firstUpdate, animationDuration: 600, randomize: firstUpdate,
        fixedNodeConstraint: fixed,
        nodeRepulsion: function(){return 4500;},
        idealEdgeLength: function(edge){return edge.data('type')==='anchor'?30:60;},
        edgeElasticity: function(edge){return edge.data('type')==='anchor'?0.8:0.1;},
        gravity: 0.25, gravityRange: 3.0, numIter: firstUpdate?250:100, padding: 40, fit: firstUpdate,
      } : {
        name: 'cose', animate: !firstUpdate, animationDuration: 600, randomize: firstUpdate,
        nodeRepulsion: function(){return 6000;}, idealEdgeLength: function(){return 60;},
        gravity: 0.4, numIter: 250, padding: 40, fit: firstUpdate,
      };
      cy.layout(opts).run();
      firstUpdate = false;
    }

    // =========================================
    // INIT
    // =========================================

    function init() {
      initGlowTextures(); resizeGlow(); createProjectLabels(); updateProjectLabels();
      initCytoscape(); updateLegend();
      var pipe = new DataPipe({ generator: generateSnapshot, interval: 4000, bufferSize: 100 });
      pipe.subscribe(applySnapshot);
      window.addEventListener('resize', function() {
        W = window.innerWidth; H = window.innerHeight;
        resizeGlow(); cy.resize(); updateProjectLabels();
        ALL_PROJECTS.forEach(function(proj) {
          var anchor = cy.getElementById('anchor-'+proj.id);
          if (anchor.length) anchor.position(projectPosition(proj, W, H));
        });
      });
      setTimeout(function() {
        resizeGlow(); cy.resize(); updateProjectLabels();
        pipe.start(); requestAnimationFrame(animateGlow);
      }, 400);
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else setTimeout(init, 100);
  </script>
</body>
