<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meadowsyn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --fg: #e4e4e7;
      --dim: #52525b;
      --muted: #3f3f46;
      --border: #27272a;
      --surface: #18181b;
      --accent: #2ecc71;
      --accent-dim: #1a4a2a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
    }

    /* --- Gallery mode --- */
    .gallery {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .gallery.hidden { display: none; }

    .gallery-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .gallery-title {
      font-size: 28px;
      letter-spacing: 6px;
      font-weight: 700;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .gallery-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      border-color: var(--dim);
      transform: translateY(-2px);
    }
    .card-tag {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--fg);
    }
    .card-desc {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.5;
    }
    .card-tech {
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
    }

    .gallery-footer {
      text-align: center;
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
    }

    /* --- Viewer mode --- */
    .viewer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 100;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .viewer.hidden { display: none; }

    .viewer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 101;
    }
    .viewer-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .viewer-back:hover { border-color: var(--dim); }
    .viewer-title {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 1px;
    }
    .viewer-nav {
      display: flex;
      gap: 8px;
    }
    .viewer-nav button {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: inherit;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .viewer-nav button:hover { border-color: var(--dim); color: var(--fg); }
    .viewer-nav button.active { border-color: var(--accent); color: var(--accent); }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* Keyboard hint */
    .kbd {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 5px;
      font-size: 10px;
      border-radius: 2px;
      margin: 0 2px;
    }
  </style>
</head>
<body>

  <div class="gallery" id="gallery">
    <div class="gallery-header">
      <div class="gallery-title">MEADOWSYN</div>
      <div class="gallery-sub">TENDING THE AUTONOMOUS GARDEN</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="gallery-footer">
      <span class="kbd">1</span>-<span class="kbd">6</span> open experiment &nbsp;
      <span class="kbd">Esc</span> back to gallery &nbsp;
      <span class="kbd">&larr;</span><span class="kbd">&rarr;</span> navigate
    </div>
  </div>

  <div class="viewer hidden" id="viewer">
    <div class="viewer-bar">
      <button class="viewer-back" id="btn-back">&larr; GARDEN</button>
      <div class="viewer-title" id="viewer-title"></div>
      <div class="viewer-nav" id="viewer-nav"></div>
    </div>
    <iframe id="viewer-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <script>
    var EXPERIMENTS = [
      {
        id: 'split-flap',
        name: 'Split-Flap Board',
        tag: 'F2 — Information',
        desc: 'Airport departure board for factory status. CSS-only flap animation, real-time agent roster with status, beads, and duration.',
        tech: 'CSS animations, JetBrains Mono, fetch polling',
        url: '/board.html',
      },
      {
        id: 'hydra-ambient',
        name: 'Hydra Ambient Field',
        tag: 'F3 — Ambient',
        desc: 'Generative WebGL shader driven by factory metrics. Throughput controls oscillation, errors shift color warmth, pressure adds turbulence.',
        tech: 'hydra-synth, WebGL, GLSL, lerp interpolation',
        url: '/hydra-ambient/',
      },
      {
        id: 'cytoscape-graph',
        name: 'Agent-Bead Graph',
        tag: 'F4 — Topology',
        desc: 'Force-directed network showing which agents work on which beads. Click to highlight dependency chains. Sized by priority.',
        tech: 'Cytoscape.js, fCoSE layout, live diffing',
        url: '/cytoscape-graph/',
      },
      {
        id: 'raster-heatmap',
        name: 'Raster Heatmap',
        tag: 'F5 — Temporal',
        desc: 'Time-series activity grid. Rows = agents sorted by activity, columns = time buckets scrolling left. Hover for detail.',
        tech: 'Canvas 2D, ring buffer history, hit-testing',
        url: '/raster-heatmap/',
      },
      {
        id: 'loopy-signals',
        name: 'Loopy Signals',
        tag: 'F6 — Systems',
        desc: 'Causal loop diagram of the factory feedback system. Animated particles flow along edges. Click any node to inject a pulse.',
        tech: 'SVG paths, particle animation, Donella Meadows',
        url: '/loopy-signals/',
      },
      {
        id: 'process-replay',
        name: 'Process Replay',
        tag: 'F7 — Process Mining',
        desc: 'Swim-lane playback of bead lifecycle. Tokens flow through lanes, grow with age. Playback controls with 1x-10x speed and scrub.',
        tech: 'Canvas animation, event sourcing, scrub bar',
        url: '/process-replay/',
      },
    ];

    var gallery = document.getElementById('gallery');
    var viewer = document.getElementById('viewer');
    var viewerFrame = document.getElementById('viewer-frame');
    var viewerTitle = document.getElementById('viewer-title');
    var viewerNav = document.getElementById('viewer-nav');
    var grid = document.getElementById('grid');
    var currentIdx = -1;

    // Build gallery cards
    EXPERIMENTS.forEach(function(exp, i) {
      var card = document.createElement('a');
      card.className = 'card';
      card.href = '#' + exp.id;

      var tag = document.createElement('div');
      tag.className = 'card-tag';
      tag.textContent = exp.tag;

      var name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = exp.name;

      var desc = document.createElement('div');
      desc.className = 'card-desc';
      desc.textContent = exp.desc;

      var tech = document.createElement('div');
      tech.className = 'card-tech';
      tech.textContent = exp.tech;

      card.appendChild(tag);
      card.appendChild(name);
      card.appendChild(desc);
      card.appendChild(tech);

      card.addEventListener('click', function(e) {
        e.preventDefault();
        openExperiment(i);
      });

      grid.appendChild(card);
    });

    // Build nav buttons
    EXPERIMENTS.forEach(function(exp, i) {
      var btn = document.createElement('button');
      btn.textContent = (i + 1) + '';
      btn.title = exp.name;
      btn.addEventListener('click', function() { openExperiment(i); });
      viewerNav.appendChild(btn);
    });

    function openExperiment(idx) {
      if (idx < 0 || idx >= EXPERIMENTS.length) return;
      currentIdx = idx;
      var exp = EXPERIMENTS[idx];

      gallery.classList.add('hidden');
      viewer.classList.remove('hidden');
      viewerTitle.textContent = exp.tag + ' — ' + exp.name;
      viewerFrame.src = exp.url;
      window.location.hash = exp.id;

      // Update nav active state
      var btns = viewerNav.children;
      for (var j = 0; j < btns.length; j++) {
        btns[j].classList.toggle('active', j === idx);
      }
    }

    function closeViewer() {
      viewer.classList.add('hidden');
      gallery.classList.remove('hidden');
      viewerFrame.src = 'about:blank';
      currentIdx = -1;
      history.pushState(null, '', window.location.pathname);
    }

    document.getElementById('btn-back').addEventListener('click', closeViewer);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeViewer();
        return;
      }
      // Number keys 1-6 to open experiments
      var num = parseInt(e.key);
      if (num >= 1 && num <= EXPERIMENTS.length) {
        openExperiment(num - 1);
        return;
      }
      // Arrow keys to navigate when viewer is open
      if (currentIdx >= 0) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          openExperiment((currentIdx + 1) % EXPERIMENTS.length);
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          openExperiment((currentIdx - 1 + EXPERIMENTS.length) % EXPERIMENTS.length);
        }
      }
    });

    // Handle initial hash
    if (window.location.hash) {
      var id = window.location.hash.slice(1);
      for (var i = 0; i < EXPERIMENTS.length; i++) {
        if (EXPERIMENTS[i].id === id) {
          openExperiment(i);
          break;
        }
      }
    }

    // Handle hash changes (back/forward)
    window.addEventListener('hashchange', function() {
      var id = window.location.hash.slice(1);
      if (!id) { closeViewer(); return; }
      for (var i = 0; i < EXPERIMENTS.length; i++) {
        if (EXPERIMENTS[i].id === id) {
          openExperiment(i);
          return;
        }
      }
    });
  </script>
</body>
</html>
