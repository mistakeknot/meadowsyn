<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <style>
    :root { --bg: #0a0a0a; --fg: #ccc; --dim: #555; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
    canvas#glow { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    canvas#halos { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
    #cy { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: transparent; }
    .hud { position: fixed; z-index: 3; pointer-events: none; }
    .hud-top { top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%); }
    .hud-bottom { bottom: 0; left: 0; right: 0; padding: 14px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; justify-content: space-between; align-items: center; }
    .hud-title { font-size: 14px; letter-spacing: 3px; color: rgba(255,255,255,0.3); }
    .hud-metrics { display: flex; gap: 20px; }
    .hud-metric .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.2); }
    .hud-metric .value { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 1px; }
    .hud-metric .value.highlight { color: rgba(241,196,15,0.8); }
    .hud-hint { font-size: 10px; color: rgba(255,255,255,0.15); }
    .state-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .state-healthy { color: rgba(46,204,113,0.5); }
    .state-busy { color: rgba(241,196,15,0.5); }
    .state-critical { color: rgba(231,76,60,0.6); }
    .project-label { position: fixed; z-index: 3; pointer-events: none;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.12);
      white-space: nowrap; transform: translate(-50%, -50%); }
    /* Delta badge */
    .delta-badge { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 4; pointer-events: none;
      font-size: 11px; letter-spacing: 1px; color: rgba(241,196,15,0.6);
      opacity: 0; transition: opacity 0.5s; }
    .delta-badge.visible { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="glow"></canvas>
  <div id="cy"></div>
  <canvas id="halos"></canvas>

  <div class="hud hud-top">
    <div class="hud-title">DELTA LAYER</div>
    <div class="hud-metrics">
      <div class="hud-metric"><div class="label">Agents</div><div class="value" id="m-agents">0</div></div>
      <div class="hud-metric"><div class="label">Active</div><div class="value" id="m-active">0</div></div>
      <div class="hud-metric"><div class="label">Changed</div><div class="value highlight" id="m-changed">0</div></div>
    </div>
  </div>

  <div class="delta-badge" id="delta-badge"></div>

  <div class="hud hud-bottom">
    <div><span class="state-label" id="state-label">HEALTHY</span></div>
    <div class="hud-hint">Yellow halos = changed since last visit &middot; Press R to reset visit timestamp</div>
  </div>

  <script type="module">
    import { DataPipe } from '../data-static/data-pipe.js';

    // =========================================
    // DELTA TRACKING (localStorage)
    // =========================================
    // Stores: { lastVisit: timestamp, nodeStates: { id: status } }
    // On each snapshot, compare current states to stored states.
    // Changed nodes get a fading halo.

    var STORAGE_KEY = 'meadowsyn-delta-layer';
    var lastVisitData = null;
    var deltaNodes = new Map(); // id -> { haloIntensity, changedAt }

    function loadLastVisit() {
      try {
        var stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return null;
        return JSON.parse(stored);
      } catch(e) { return null; }
    }

    function saveVisitState(snapshot) {
      var states = {};
      if (snapshot && snapshot.fleet) {
        snapshot.fleet.agents.forEach(function(a) {
          states['a-'+a.agent.replace(/[^a-z0-9]/gi,'_')] = a.status;
        });
      }
      if (snapshot && snapshot.beads) {
        snapshot.beads.forEach(function(b) { states[b.id] = b.status; });
      }
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ lastVisit: Date.now(), nodeStates: states }));
      } catch(e) {}
    }

    function detectDeltas(snapshot) {
      if (!lastVisitData || !lastVisitData.nodeStates) return;
      var old = lastVisitData.nodeStates;
      var now = Date.now();
      var count = 0;

      if (snapshot.fleet) {
        snapshot.fleet.agents.forEach(function(a) {
          var id = 'a-'+a.agent.replace(/[^a-z0-9]/gi,'_');
          var oldStatus = old[id];
          if (oldStatus !== undefined && oldStatus !== a.status) {
            if (!deltaNodes.has(id)) { deltaNodes.set(id, { haloIntensity: 1.0, changedAt: now }); count++; }
          } else if (oldStatus === undefined) {
            // New node
            if (!deltaNodes.has(id)) { deltaNodes.set(id, { haloIntensity: 1.0, changedAt: now }); count++; }
          }
        });
      }
      if (snapshot.beads) {
        snapshot.beads.forEach(function(b) {
          var oldStatus = old[b.id];
          if (oldStatus !== undefined && oldStatus !== b.status) {
            if (!deltaNodes.has(b.id)) { deltaNodes.set(b.id, { haloIntensity: 1.0, changedAt: now }); count++; }
          } else if (oldStatus === undefined) {
            if (!deltaNodes.has(b.id)) { deltaNodes.set(b.id, { haloIntensity: 1.0, changedAt: now }); count++; }
          }
        });
      }
      return count;
    }

    // Reset visit timestamp
    document.addEventListener('keydown', function(e) {
      if (e.key === 'r' || e.key === 'R') {
        deltaNodes.clear();
        lastVisitData = { lastVisit: Date.now(), nodeStates: {} };
        // Save current as baseline
        if (latestSnap) saveVisitState(latestSnap);
        lastVisitData = loadLastVisit();
        document.getElementById('m-changed').textContent = '0';
        var badge = document.getElementById('delta-badge');
        badge.textContent = 'Visit reset';
        badge.classList.add('visible');
        setTimeout(function() { badge.classList.remove('visible'); }, 2000);
      }
    });

    // =========================================
    // HALO CANVAS (drawn over graph)
    // =========================================
    var haloCanvas = document.getElementById('halos');
    var haloCtx = haloCanvas.getContext('2d');
    var haloTexture = null;

    function initHaloTexture() {
      var size = 80;
      haloTexture = document.createElement('canvas');
      haloTexture.width = size; haloTexture.height = size;
      var ctx = haloTexture.getContext('2d');
      var grad = ctx.createRadialGradient(size/2, size/2, size*0.15, size/2, size/2, size/2);
      grad.addColorStop(0, 'rgba(241,196,15,0)');
      grad.addColorStop(0.5, 'rgba(241,196,15,0.8)');
      grad.addColorStop(0.7, 'rgba(241,196,15,0.3)');
      grad.addColorStop(1, 'rgba(241,196,15,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
    }

    function resizeHalo() {
      var d = window.devicePixelRatio || 1;
      haloCanvas.width = W * d;
      haloCanvas.height = H * d;
      haloCanvas.style.width = W + 'px';
      haloCanvas.style.height = H + 'px';
      haloCtx.setTransform(d, 0, 0, d, 0, 0);
    }

    function drawHalos() {
      haloCtx.clearRect(0, 0, W, H);
      if (!cy) return;
      var now = Date.now();
      var activeCount = 0;

      deltaNodes.forEach(function(delta, id) {
        // Decay over 5 minutes (bright=just changed, dim=changed long ago)
        var age = (now - delta.changedAt) / 1000; // seconds
        var decay = Math.max(0, 1 - age / 300); // 5 min decay
        delta.haloIntensity = decay;

        if (decay < 0.02) { deltaNodes.delete(id); return; }

        var node = cy.getElementById(id);
        if (!node.length) return;
        var pos = node.renderedPosition();

        // Pulsing halo
        var pulse = 0.8 + 0.2 * Math.sin(now * 0.003 + id.length);
        var sz = 60 + 20 * pulse;
        haloCtx.globalAlpha = decay * pulse * 0.7;
        haloCtx.drawImage(haloTexture, pos.x - sz/2, pos.y - sz/2, sz, sz);
        activeCount++;
      });

      haloCtx.globalAlpha = 1;
      document.getElementById('m-changed').textContent = String(activeCount);
    }

    // =========================================
    // PROJECT CONSTELLATION + GLOW (reused from F11)
    // =========================================
    var LAYER_Y = { L1: 0.78, L2: 0.50, L3: 0.22 };
    var PILLAR_PROJECTS = [
      { id:'intercore',label:'Intercore',layer:'L1',x:0.25 },
      { id:'intermute',label:'Intermute',layer:'L1',x:0.50 },
      { id:'interweave',label:'Interweave',layer:'L1',x:0.75 },
      { id:'clavain',label:'Clavain',layer:'L2',x:0.20 },
      { id:'skaffen',label:'Skaffen',layer:'L2',x:0.50 },
      { id:'ockham',label:'Ockham',layer:'L2',x:0.80 },
      { id:'autarch',label:'Autarch',layer:'L3',x:0.25 },
      { id:'meadowsyn',label:'Meadowsyn',layer:'L3',x:0.50 },
      { id:'intercom',label:'Intercom',layer:'L3',x:0.75 },
    ];
    var ALL_PROJECTS = [];
    PILLAR_PROJECTS.forEach(function(p) { ALL_PROJECTS.push({id:p.id,label:p.label,nx:p.x,ny:LAYER_Y[p.layer]}); });
    var PROJECT_MAP = new Map();
    ALL_PROJECTS.forEach(function(p) { PROJECT_MAP.set(p.id, p); });
    var PROJECT_IDS = ALL_PROJECTS.map(function(p){return p.id;});
    function projectPosition(p,vW,vH) { var pad=100; return {x:pad+p.nx*(vW-2*pad),y:pad+p.ny*(vH-2*pad)}; }

    var glowCanvas = document.getElementById('glow'), glowCtx = glowCanvas.getContext('2d');
    var W, H, dpr;
    var GLOW_COLORS = { idle:{r:60,g:60,b:60},dispatching:{r:52,g:120,b:210},executing:{r:46,g:190,b:100},blocked:{r:220,g:60,b:50},gated:{r:230,g:150,b:30} };
    var GLOW_INTENSITY = { idle:0.02,dispatching:0.08,executing:0.03,blocked:0.35,gated:0.28 };
    var GLOW_RADIUS = 110, glowTextures = {}, glowNodes = new Map();

    function initGlowTextures() {
      var size = GLOW_RADIUS*2;
      Object.keys(GLOW_COLORS).forEach(function(s) {
        var c=GLOW_COLORS[s],off=document.createElement('canvas'); off.width=size;off.height=size;
        var ctx=off.getContext('2d'),g=ctx.createRadialGradient(GLOW_RADIUS,GLOW_RADIUS,0,GLOW_RADIUS,GLOW_RADIUS,GLOW_RADIUS);
        g.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+',1)');g.addColorStop(0.4,'rgba('+c.r+','+c.g+','+c.b+',0.4)');
        g.addColorStop(1,'rgba('+c.r+','+c.g+','+c.b+',0)'); ctx.fillStyle=g;ctx.fillRect(0,0,size,size);
        glowTextures[s]=off;
      });
    }
    function resizeGlow() {
      dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;
      glowCanvas.width=W*dpr*0.5;glowCanvas.height=H*dpr*0.5;
      glowCanvas.style.width=W+'px';glowCanvas.style.height=H+'px';
      glowCtx.setTransform(dpr*0.5,0,0,dpr*0.5,0,0);
    }
    function lerp(a,b,t){return a+(b-a)*t;}
    function drawGlow() {
      glowCtx.clearRect(0,0,W,H);
      glowNodes.forEach(function(g) {
        if(g.intensity<0.008)return;var tex=glowTextures[g.status]||glowTextures.idle;if(!tex)return;
        glowCtx.globalAlpha=g.intensity;glowCtx.drawImage(tex,g.x-g.radius,g.y-g.radius,g.radius*2,g.radius*2);
      });glowCtx.globalAlpha=1;
    }
    function syncGlow() {
      if(!cy)return;
      cy.nodes('[type != "anchor"]').forEach(function(n) {
        var id=n.id(),pos=n.renderedPosition(),s=n.data('status')||'idle';
        var ti=GLOW_INTENSITY[s]||0.02,ib=n.data('type')==='bead';ti=ib?ti*0.3:ti;
        var tr=ib?GLOW_RADIUS*0.4:GLOW_RADIUS;
        var g=glowNodes.get(id);
        if(!g){g={x:pos.x,y:pos.y,radius:tr,intensity:0,status:s};glowNodes.set(id,g);}
        g.x=lerp(g.x,pos.x,0.15);g.y=lerp(g.y,pos.y,0.15);g.intensity=lerp(g.intensity,ti,0.06);g.radius=lerp(g.radius,tr,0.06);g.status=s;
      });
      glowNodes.forEach(function(_,id){if(!cy.getElementById(id).length)glowNodes.delete(id);});
    }
    function animate() { syncGlow();drawGlow();drawHalos();requestAnimationFrame(animate); }

    // Project labels
    function createProjectLabels() {
      PILLAR_PROJECTS.forEach(function(p) { var el=document.createElement('div');el.className='project-label';el.textContent=p.label;document.body.appendChild(el); });
    }
    function updateProjectLabels() {
      var labels=document.querySelectorAll('.project-label');
      PILLAR_PROJECTS.forEach(function(p,i){if(labels[i]){var pos=projectPosition(ALL_PROJECTS[i],W,H);labels[i].style.left=pos.x+'px';labels[i].style.top=(pos.y-50)+'px';}});
    }

    // =========================================
    // CYTOSCAPE
    // =========================================
    var AGENT_COLORS = { idle:'#333',dispatching:'#3498db',executing:'#2ecc71',blocked:'#e74c3c',gated:'#f39c12' };
    var BEAD_COLORS = { open:'#3498db',in_progress:'#2ecc71',blocked:'#e74c3c' };
    var cy;
    function initCytoscape() {
      if(window.cytoscapeFcose&&typeof cytoscape!=='undefined'){try{var e=cytoscape.extensions();if(!(e&&e.layout&&e.layout.fcose))cytoscape.use(window.cytoscapeFcose);}catch(x){}}
      cy = cytoscape({ container:document.getElementById('cy'),
        style:[
          {selector:'node[type="anchor"]',style:{'width':1,'height':1,'opacity':0,'label':'','events':'no'}},
          {selector:'node[type="agent"]',style:{'shape':'ellipse','label':'data(label)','text-valign':'bottom','text-halign':'center',
            'font-size':'9px','font-family':'JetBrains Mono, monospace','color':'rgba(255,255,255,0.5)',
            'text-margin-y':6,'text-outline-color':'rgba(0,0,0,0.8)','text-outline-width':2,
            'background-color':'data(color)','width':'data(size)','height':'data(size)',
            'border-width':1.5,'border-color':'rgba(255,255,255,0.12)','overlay-opacity':0}},
          {selector:'node[type="bead"]',style:{'shape':'round-rectangle','label':'data(label)','text-valign':'bottom','text-halign':'center',
            'font-size':'8px','font-family':'JetBrains Mono, monospace','color':'rgba(255,255,255,0.35)',
            'text-margin-y':6,'text-outline-color':'rgba(0,0,0,0.8)','text-outline-width':2,
            'background-color':'data(color)','width':'data(size)','height':'mapData(size, 20, 40, 14, 28)',
            'border-width':0,'overlay-opacity':0}},
          {selector:'edge[type="anchor"]',style:{'opacity':0,'events':'no'}},
          {selector:'edge[type="works-on"]',style:{'line-color':'rgba(255,255,255,0.07)','target-arrow-color':'rgba(255,255,255,0.07)',
            'target-arrow-shape':'triangle','curve-style':'bezier','width':1.5,'arrow-scale':0.7,'overlay-opacity':0}},
          {selector:'.highlighted',style:{'opacity':1,'z-index':10}},
          {selector:'.dimmed',style:{'opacity':0.08}},
        ],
        layout:{name:'preset'}, minZoom:0.3,maxZoom:3,wheelSensitivity:0.3 });
      cy.on('tap','node[type != "anchor"]',function(evt){var n=evt.target;cy.elements().addClass('dimmed');n.neighborhood().add(n).filter('[type!="anchor"]').removeClass('dimmed').addClass('highlighted');});
      cy.on('tap',function(evt){if(evt.target===cy)cy.elements().removeClass('dimmed highlighted');});
      ALL_PROJECTS.forEach(function(p){cy.add({data:{id:'anchor-'+p.id,type:'anchor'},position:projectPosition(p,W,H)});});
    }

    // =========================================
    // MOCK DATA
    // =========================================
    var SHIPS = ['Mistake Not','Grey Area','Falling Outside','Sleeper Service','Just Read Instr.','Still Love You',
      'So Much Subtlety','No Gravitas','Gravitas Shortfall','Honest Mistake','No More Nice Guy','Quietly Confident',
      'Sense Amid Madness','Profit Margin','Limiting Factor','Conflict Evidence','Ethics Gradient','Xenophobe'];
    var AP = new Map(); SHIPS.forEach(function(n,i){AP.set(n,PROJECT_IDS[i%PROJECT_IDS.length]);});
    var BEADS=[],BP=new Map();
    for(var i=0;i<15;i++){var bid='Demarch-'+(3000+i).toString(36);BEADS.push({id:bid,priority:i<2?'P0':i<6?'P1':'P2',status:Math.random()<0.4?'in_progress':'open'});BP.set(bid,PROJECT_IDS[i%PROJECT_IDS.length]);}
    var STATUSES=['idle','dispatching','executing','blocked','gated'],SW=[0.30,0.10,0.40,0.10,0.07];
    function wRand(w){var r=Math.random(),a=0;for(var i=0;i<w.length;i++){a+=w[i];if(r<a)return i;}return w.length-1;}
    var ASSIGN=new Map();SHIPS.forEach(function(n){var bs=[];for(var j=0;j<(Math.random()<0.5?1:2);j++){var b=BEADS[Math.floor(Math.random()*BEADS.length)].id;if(bs.indexOf(b)<0)bs.push(b);}ASSIGN.set(n,bs);});
    var agentStates = new Map();
    var latestSnap = null;

    function generateSnapshot() {
      var agents=SHIPS.map(function(name){
        var s=agentStates.get(name)||'idle';
        if(Math.random()<0.15) s=STATUSES[wRand(SW)]; // Higher change rate to demo deltas
        agentStates.set(name,s);
        return {agent:name,status:s,beads:ASSIGN.get(name)||[],project:AP.get(name)};
      });
      var total=agents.length,active=agents.filter(function(a){return a.status!=='idle';}).length;
      var blocked=agents.filter(function(a){return a.status==='blocked';}).length;
      latestSnap = {timestamp:new Date().toISOString(),fleet:{total:total,active:active,agents:agents},
        beads:BEADS,bead_projects:Object.fromEntries(BP),
        metrics:{utilization:active/total,errorRate:blocked/Math.max(active,1)}};
      return latestSnap;
    }

    // =========================================
    // DATA -> GRAPH
    // =========================================
    var firstUpdate=true,layoutPending=false;

    function applySnapshot(snap) {
      if(!snap||!cy)return;
      var m=snap.metrics||{};
      document.getElementById('m-agents').textContent=String(snap.fleet.total);
      document.getElementById('m-active').textContent=String(snap.fleet.active);
      var state=(m.errorRate||0)>0.3?'critical':(m.utilization||0)>0.7?'busy':'healthy';
      var sl=document.getElementById('state-label');sl.textContent=state.toUpperCase();sl.className='state-label state-'+state;

      // Detect deltas against last visit
      var newDeltas = detectDeltas(snap);
      if (newDeltas > 0 && firstUpdate) {
        var badge = document.getElementById('delta-badge');
        badge.textContent = newDeltas + ' changed since last visit';
        badge.classList.add('visible');
        setTimeout(function() { badge.classList.remove('visible'); }, 4000);
      }

      var toAdd=[];
      snap.fleet.agents.forEach(function(a){
        var id='a-'+a.agent.replace(/[^a-z0-9]/gi,'_');
        var color=AGENT_COLORS[a.status]||AGENT_COLORS.idle,sz=a.status==='idle'?16:24;
        var ex=cy.getElementById(id);
        if(ex.length){ex.data('color',color);ex.data('size',sz);ex.data('status',a.status);}
        else{
          var pd=PROJECT_MAP.get(a.project),ap=pd?projectPosition(pd,W,H):{x:W/2,y:H/2};
          toAdd.push({data:{id:id,label:a.agent,type:'agent',color:color,size:sz,status:a.status,project:a.project},position:{x:ap.x+(Math.random()-0.5)*60,y:ap.y+(Math.random()-0.5)*60}});
          toAdd.push({data:{id:'anc-'+id,source:id,target:'anchor-'+a.project,type:'anchor',weight:8}});layoutPending=true;
        }
        (a.beads||[]).forEach(function(bid){var eid=id+'->'+bid;if(!cy.getElementById(eid).length)toAdd.push({data:{id:eid,source:id,target:bid,type:'works-on'}});});
      });
      var bp=snap.bead_projects||{};
      (snap.beads||[]).forEach(function(b){
        var color=BEAD_COLORS[b.status]||BEAD_COLORS.open,sz=b.priority==='P0'?36:b.priority==='P1'?26:18;
        var proj=bp[b.id]||'clavain';
        var ex=cy.getElementById(b.id);
        if(ex.length){ex.data('color',color);ex.data('size',sz);ex.data('status',b.status);}
        else{
          var pd=PROJECT_MAP.get(proj),ap=pd?projectPosition(pd,W,H):{x:W/2,y:H/2};
          toAdd.push({data:{id:b.id,label:b.id,type:'bead',color:color,size:sz,status:b.status,project:proj},position:{x:ap.x+(Math.random()-0.5)*40,y:ap.y+(Math.random()-0.5)*40}});
          toAdd.push({data:{id:'anc-'+b.id,source:b.id,target:'anchor-'+proj,type:'anchor',weight:5}});layoutPending=true;
        }
      });
      if(toAdd.length)cy.add(toAdd);
      if(layoutPending){
        var fixed=[];ALL_PROJECTS.forEach(function(p){fixed.push({nodeId:'anchor-'+p.id,position:projectPosition(p,W,H)});});
        var hf=false;try{var e=cytoscape.extensions();hf=!!(e&&e.layout&&e.layout.fcose);}catch(x){}
        cy.layout(hf?{name:'fcose',animate:false,randomize:firstUpdate,fixedNodeConstraint:fixed,
          nodeRepulsion:function(){return 4500;},idealEdgeLength:function(e){return e.data('type')==='anchor'?30:60;},
          edgeElasticity:function(e){return e.data('type')==='anchor'?0.8:0.1;},
          gravity:0.25,gravityRange:3.0,numIter:firstUpdate?250:100,padding:40,fit:firstUpdate
        }:{name:'cose',animate:false,randomize:firstUpdate,nodeRepulsion:function(){return 6000;},
          idealEdgeLength:function(){return 60;},gravity:0.4,numIter:250,padding:40,fit:firstUpdate}).run();
        layoutPending=false;firstUpdate=false;
      }

      // Save current state for next visit
      saveVisitState(snap);
    }

    // =========================================
    // INIT
    // =========================================
    function init() {
      lastVisitData = loadLastVisit();
      initGlowTextures();initHaloTexture();resizeGlow();
      W=window.innerWidth;H=window.innerHeight;resizeHalo();
      createProjectLabels();updateProjectLabels();initCytoscape();
      var pipe=new DataPipe({generator:generateSnapshot,interval:4000,bufferSize:100});
      pipe.subscribe(applySnapshot);
      window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight;resizeGlow();resizeHalo();cy.resize();updateProjectLabels();
        ALL_PROJECTS.forEach(function(p){var a=cy.getElementById('anchor-'+p.id);if(a.length)a.position(projectPosition(p,W,H));});});
      setTimeout(function(){resizeGlow();resizeHalo();cy.resize();updateProjectLabels();pipe.start();requestAnimationFrame(animate);},400);
    }
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
    else setTimeout(init,100);
  </script>
</body>
</html>
