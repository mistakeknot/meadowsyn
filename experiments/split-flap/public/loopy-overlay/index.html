<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loopy Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <style>
    :root { --bg: #0a0a0a; --fg: #ccc; --dim: #555; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--fg); font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
    canvas#glow { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    #cy { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: transparent; }

    /* CLD overlay — semi-transparent on top */
    .cld-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 3; pointer-events: none;
      opacity: 0; transition: opacity 0.5s;
    }
    .cld-overlay.visible { opacity: 1; }
    .cld-overlay svg { width: 100%; height: 100%; }

    .hud { position: fixed; z-index: 4; pointer-events: none; }
    .hud-top { top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%); }
    .hud-bottom { bottom: 0; left: 0; right: 0; padding: 14px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      display: flex; justify-content: space-between; align-items: center; }
    .hud-title { font-size: 14px; letter-spacing: 3px; color: rgba(255,255,255,0.3); }
    .hud-metrics { display: flex; gap: 20px; }
    .hud-metric .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.2); }
    .hud-metric .value { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 1px; }
    .hud-hint { font-size: 10px; color: rgba(255,255,255,0.15); }
    .state-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .state-healthy { color: rgba(46,204,113,0.5); }

    /* CLD toggle indicator */
    .cld-badge { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 5;
      font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.2); pointer-events: none;
      transition: color 0.3s; }
    .cld-badge.active { color: rgba(46,204,113,0.5); }

    .project-label { position: fixed; z-index: 2; pointer-events: none;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.12);
      white-space: nowrap; transform: translate(-50%, -50%); }
  </style>
</head>
<body>
  <canvas id="glow"></canvas>
  <div id="cy"></div>

  <!-- CLD overlay: Donella Meadows factory feedback loops -->
  <div class="cld-overlay" id="cld-overlay">
    <svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arr-g" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="rgba(46,204,113,0.5)"/>
        </marker>
        <marker id="arr-r" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="rgba(231,76,60,0.5)"/>
        </marker>
      </defs>

      <!-- CLD Nodes (positioned to map onto graph regions) -->
      <g class="cld-nodes">
        <!-- Backlog (left) -->
        <rect x="80" y="350" width="140" height="50" rx="6" fill="none" stroke="rgba(52,152,219,0.3)" stroke-width="1.5"/>
        <text x="150" y="380" fill="rgba(52,152,219,0.5)" font-family="JetBrains Mono" font-size="11" text-anchor="middle">BACKLOG</text>

        <!-- Dispatch (center-left) -->
        <rect x="320" y="250" width="140" height="50" rx="6" fill="none" stroke="rgba(46,204,113,0.3)" stroke-width="1.5"/>
        <text x="390" y="280" fill="rgba(46,204,113,0.5)" font-family="JetBrains Mono" font-size="11" text-anchor="middle">DISPATCH</text>

        <!-- Execution (center) -->
        <rect x="560" y="350" width="140" height="50" rx="6" fill="none" stroke="rgba(46,204,113,0.3)" stroke-width="1.5"/>
        <text x="630" y="380" fill="rgba(46,204,113,0.5)" font-family="JetBrains Mono" font-size="11" text-anchor="middle">EXECUTION</text>

        <!-- Review/Gate (center-right) -->
        <rect x="800" y="250" width="140" height="50" rx="6" fill="none" stroke="rgba(241,196,15,0.3)" stroke-width="1.5"/>
        <text x="870" y="280" fill="rgba(241,196,15,0.5)" font-family="JetBrains Mono" font-size="11" text-anchor="middle">REVIEW</text>

        <!-- Shipped (right) -->
        <rect x="1020" y="350" width="140" height="50" rx="6" fill="none" stroke="rgba(46,204,113,0.3)" stroke-width="1.5"/>
        <text x="1090" y="380" fill="rgba(46,204,113,0.5)" font-family="JetBrains Mono" font-size="11" text-anchor="middle">SHIPPED</text>

        <!-- Rework (bottom) -->
        <rect x="560" y="520" width="140" height="50" rx="6" fill="none" stroke="rgba(231,76,60,0.3)" stroke-width="1.5"/>
        <text x="630" y="550" fill="rgba(231,76,60,0.5)" font-family="JetBrains Mono" font-size="11" text-anchor="middle">REWORK</text>
      </g>

      <!-- CLD Edges (flow) -->
      <g class="cld-edges">
        <!-- Forward flow: Backlog -> Dispatch -> Execution -> Review -> Shipped -->
        <path d="M220,375 Q270,310 320,275" fill="none" stroke="rgba(46,204,113,0.25)" stroke-width="2" marker-end="url(#arr-g)"/>
        <path d="M460,275 Q510,340 560,375" fill="none" stroke="rgba(46,204,113,0.25)" stroke-width="2" marker-end="url(#arr-g)"/>
        <path d="M700,375 Q750,310 800,275" fill="none" stroke="rgba(46,204,113,0.25)" stroke-width="2" marker-end="url(#arr-g)"/>
        <path d="M940,275 Q980,340 1020,375" fill="none" stroke="rgba(46,204,113,0.25)" stroke-width="2" marker-end="url(#arr-g)"/>

        <!-- Rework loop: Review -> Rework -> Backlog -->
        <path d="M870,300 Q870,430 700,545" fill="none" stroke="rgba(231,76,60,0.2)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-r)"/>
        <path d="M560,545 Q300,530 150,400" fill="none" stroke="rgba(231,76,60,0.2)" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-r)"/>
      </g>

      <!-- Loop labels -->
      <text x="640" y="200" fill="rgba(46,204,113,0.3)" font-family="JetBrains Mono" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">R THROUGHPUT</text>
      <text x="500" y="620" fill="rgba(231,76,60,0.3)" font-family="JetBrains Mono" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">B REWORK</text>

      <!-- Animated particles along edges (via JS) -->
      <g id="cld-particles"></g>
    </svg>
  </div>

  <div class="hud hud-top">
    <div class="hud-title">LOOPY OVERLAY</div>
    <div class="hud-metrics">
      <div class="hud-metric"><div class="label">Throughput</div><div class="value" id="m-throughput">0/min</div></div>
      <div class="hud-metric"><div class="label">Rework</div><div class="value" id="m-rework">0%</div></div>
      <div class="hud-metric"><div class="label">Queue</div><div class="value" id="m-queue">0</div></div>
    </div>
  </div>

  <div class="cld-badge" id="cld-badge">CLD OFF</div>

  <div class="hud hud-bottom">
    <div><span class="state-label state-healthy" id="state-label">HEALTHY</span></div>
    <div class="hud-hint">Press <span style="color:rgba(255,255,255,0.3)">L</span> to toggle CLD overlay &middot; Macro + micro views of same system</div>
  </div>

  <script type="module">
    import { DataPipe } from '../data-static/data-pipe.js';

    // =========================================
    // CLD OVERLAY TOGGLE
    // =========================================
    var cldVisible = false;
    var cldParticles = [];

    document.addEventListener('keydown', function(e) {
      if (e.key === 'l' || e.key === 'L') {
        cldVisible = !cldVisible;
        document.getElementById('cld-overlay').classList.toggle('visible', cldVisible);
        document.getElementById('cld-badge').classList.toggle('active', cldVisible);
        document.getElementById('cld-badge').textContent = cldVisible ? 'CLD ON' : 'CLD OFF';
      }
    });

    // CLD particle animation along SVG edges
    var CLD_PATHS = [
      { d: 'M220,375 Q270,310 320,275', color: 'rgba(46,204,113,0.6)', speed: 0.008 },
      { d: 'M460,275 Q510,340 560,375', color: 'rgba(46,204,113,0.6)', speed: 0.008 },
      { d: 'M700,375 Q750,310 800,275', color: 'rgba(46,204,113,0.6)', speed: 0.008 },
      { d: 'M940,275 Q980,340 1020,375', color: 'rgba(46,204,113,0.6)', speed: 0.008 },
      { d: 'M870,300 Q870,430 700,545', color: 'rgba(231,76,60,0.5)', speed: 0.005 },
      { d: 'M560,545 Q300,530 150,400', color: 'rgba(231,76,60,0.5)', speed: 0.005 },
    ];

    // Pre-compute SVG path lengths for particle positioning
    var cldPathEls = [];
    function initCLDPaths() {
      var svg = document.querySelector('#cld-overlay svg');
      CLD_PATHS.forEach(function(p) {
        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', p.d);
        path.style.display = 'none';
        svg.appendChild(path);
        cldPathEls.push({ el: path, length: path.getTotalLength(), color: p.color, speed: p.speed });
        // Spawn 3 particles per path
        for (var i = 0; i < 3; i++) {
          cldParticles.push({ pathIdx: cldPathEls.length - 1, progress: Math.random() });
        }
      });
    }

    function animateCLDParticles() {
      var container = document.getElementById('cld-particles');
      while (container.firstChild) container.removeChild(container.firstChild);
      if (!cldVisible) return;

      cldParticles.forEach(function(p) {
        var path = cldPathEls[p.pathIdx];
        p.progress += path.speed;
        if (p.progress > 1) p.progress -= 1;

        var pt = path.el.getPointAtLength(p.progress * path.length);
        var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', pt.x);
        circle.setAttribute('cy', pt.y);
        circle.setAttribute('r', 3);
        circle.setAttribute('fill', path.color);
        container.appendChild(circle);
      });
    }

    // =========================================
    // PROJECT CONSTELLATION + GLOW (standard)
    // =========================================
    var LAYER_Y={L1:0.78,L2:0.50,L3:0.22};
    var PILLAR_PROJECTS=[
      {id:'intercore',label:'Intercore',layer:'L1',x:0.25},{id:'intermute',label:'Intermute',layer:'L1',x:0.50},
      {id:'interweave',label:'Interweave',layer:'L1',x:0.75},{id:'clavain',label:'Clavain',layer:'L2',x:0.20},
      {id:'skaffen',label:'Skaffen',layer:'L2',x:0.50},{id:'ockham',label:'Ockham',layer:'L2',x:0.80},
      {id:'autarch',label:'Autarch',layer:'L3',x:0.25},{id:'meadowsyn',label:'Meadowsyn',layer:'L3',x:0.50},
      {id:'intercom',label:'Intercom',layer:'L3',x:0.75}];
    var ALL_PROJECTS=[];PILLAR_PROJECTS.forEach(function(p){ALL_PROJECTS.push({id:p.id,label:p.label,nx:p.x,ny:LAYER_Y[p.layer]});});
    var PROJECT_MAP=new Map();ALL_PROJECTS.forEach(function(p){PROJECT_MAP.set(p.id,p);});
    var PROJECT_IDS=ALL_PROJECTS.map(function(p){return p.id;});
    function projectPosition(p,vW,vH){var pad=100;return{x:pad+p.nx*(vW-2*pad),y:pad+p.ny*(vH-2*pad)};}

    var glowCanvas=document.getElementById('glow'),glowCtx=glowCanvas.getContext('2d');
    var W,H,dpr;
    var GLOW_COLORS={idle:{r:60,g:60,b:60},dispatching:{r:52,g:120,b:210},executing:{r:46,g:190,b:100},blocked:{r:220,g:60,b:50},gated:{r:230,g:150,b:30}};
    var GLOW_INTENSITY={idle:0.02,dispatching:0.08,executing:0.03,blocked:0.35,gated:0.28};
    var GLOW_RADIUS=110,glowTextures={},glowNodes=new Map();
    function initGlowTextures(){var size=GLOW_RADIUS*2;Object.keys(GLOW_COLORS).forEach(function(s){var c=GLOW_COLORS[s],off=document.createElement('canvas');off.width=size;off.height=size;var ctx=off.getContext('2d'),g=ctx.createRadialGradient(GLOW_RADIUS,GLOW_RADIUS,0,GLOW_RADIUS,GLOW_RADIUS,GLOW_RADIUS);g.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+',1)');g.addColorStop(0.4,'rgba('+c.r+','+c.g+','+c.b+',0.4)');g.addColorStop(1,'rgba('+c.r+','+c.g+','+c.b+',0)');ctx.fillStyle=g;ctx.fillRect(0,0,size,size);glowTextures[s]=off;});}
    function resizeGlow(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;glowCanvas.width=W*dpr*0.5;glowCanvas.height=H*dpr*0.5;glowCanvas.style.width=W+'px';glowCanvas.style.height=H+'px';glowCtx.setTransform(dpr*0.5,0,0,dpr*0.5,0,0);}
    function lerp(a,b,t){return a+(b-a)*t;}
    function drawGlow(){glowCtx.clearRect(0,0,W,H);glowNodes.forEach(function(g){if(g.intensity<0.008)return;var tex=glowTextures[g.status]||glowTextures.idle;if(!tex)return;glowCtx.globalAlpha=g.intensity;glowCtx.drawImage(tex,g.x-g.radius,g.y-g.radius,g.radius*2,g.radius*2);});glowCtx.globalAlpha=1;}
    function syncGlow(){if(!cy)return;cy.nodes('[type != "anchor"]').forEach(function(n){var id=n.id(),pos=n.renderedPosition(),s=n.data('status')||'idle',ti=GLOW_INTENSITY[s]||0.02,ib=n.data('type')==='bead';ti=ib?ti*0.3:ti;var tr=ib?GLOW_RADIUS*0.4:GLOW_RADIUS;var g=glowNodes.get(id);if(!g){g={x:pos.x,y:pos.y,radius:tr,intensity:0,status:s};glowNodes.set(id,g);}g.x=lerp(g.x,pos.x,0.15);g.y=lerp(g.y,pos.y,0.15);g.intensity=lerp(g.intensity,ti,0.06);g.radius=lerp(g.radius,tr,0.06);g.status=s;});glowNodes.forEach(function(_,id){if(!cy.getElementById(id).length)glowNodes.delete(id);});}
    function animate(){syncGlow();drawGlow();animateCLDParticles();requestAnimationFrame(animate);}
    function createProjectLabels(){PILLAR_PROJECTS.forEach(function(p){var el=document.createElement('div');el.className='project-label';el.textContent=p.label;document.body.appendChild(el);});}
    function updateProjectLabels(){var labels=document.querySelectorAll('.project-label');PILLAR_PROJECTS.forEach(function(p,i){if(labels[i]){var pos=projectPosition(ALL_PROJECTS[i],W,H);labels[i].style.left=pos.x+'px';labels[i].style.top=(pos.y-50)+'px';}});}

    // =========================================
    // CYTOSCAPE
    // =========================================
    var AGENT_COLORS={idle:'#333',dispatching:'#3498db',executing:'#2ecc71',blocked:'#e74c3c',gated:'#f39c12'};
    var cy;
    function initCytoscape(){
      if(window.cytoscapeFcose&&typeof cytoscape!=='undefined'){try{var e=cytoscape.extensions();if(!(e&&e.layout&&e.layout.fcose))cytoscape.use(window.cytoscapeFcose);}catch(x){}}
      cy=cytoscape({container:document.getElementById('cy'),
        style:[
          {selector:'node[type="anchor"]',style:{'width':1,'height':1,'opacity':0,'label':'','events':'no'}},
          {selector:'node[type="agent"]',style:{'shape':'ellipse','label':'data(label)','text-valign':'bottom','text-halign':'center','font-size':'9px','font-family':'JetBrains Mono, monospace','color':'rgba(255,255,255,0.5)','text-margin-y':6,'text-outline-color':'rgba(0,0,0,0.8)','text-outline-width':2,'background-color':'data(color)','width':'data(size)','height':'data(size)','border-width':1.5,'border-color':'rgba(255,255,255,0.12)','overlay-opacity':0}},
          {selector:'node[type="bead"]',style:{'shape':'round-rectangle','label':'data(label)','text-valign':'bottom','text-halign':'center','font-size':'8px','font-family':'JetBrains Mono, monospace','color':'rgba(255,255,255,0.35)','text-margin-y':6,'text-outline-color':'rgba(0,0,0,0.8)','text-outline-width':2,'background-color':'data(color)','width':'data(size)','height':'mapData(size, 20, 40, 14, 28)','border-width':0,'overlay-opacity':0}},
          {selector:'edge[type="anchor"]',style:{'opacity':0,'events':'no'}},
          {selector:'edge[type="works-on"]',style:{'line-color':'rgba(255,255,255,0.07)','target-arrow-color':'rgba(255,255,255,0.07)','target-arrow-shape':'triangle','curve-style':'bezier','width':1.5,'arrow-scale':0.7,'overlay-opacity':0}},
          {selector:'.dimmed',style:{'opacity':0.08}},{selector:'.highlighted',style:{'opacity':1,'z-index':10}},
        ],
        layout:{name:'preset'},minZoom:0.3,maxZoom:3,wheelSensitivity:0.3});
      cy.on('tap','node[type != "anchor"]',function(evt){var n=evt.target;cy.elements().addClass('dimmed');n.neighborhood().add(n).filter('[type!="anchor"]').removeClass('dimmed').addClass('highlighted');});
      cy.on('tap',function(evt){if(evt.target===cy)cy.elements().removeClass('dimmed highlighted');});
      ALL_PROJECTS.forEach(function(p){cy.add({data:{id:'anchor-'+p.id,type:'anchor'},position:projectPosition(p,W,H)});});
    }

    // =========================================
    // MOCK DATA
    // =========================================
    var SHIPS=['Mistake Not','Grey Area','Falling Outside','Sleeper Service','Just Read Instr.','Still Love You',
      'So Much Subtlety','No Gravitas','Gravitas Shortfall','Honest Mistake','No More Nice Guy','Quietly Confident'];
    var AP=new Map();SHIPS.forEach(function(n,i){AP.set(n,PROJECT_IDS[i%PROJECT_IDS.length]);});
    var BEADS=[],BP=new Map();
    for(var i=0;i<12;i++){var bid='b-'+i;BEADS.push({id:bid,priority:i<2?'P0':i<5?'P1':'P2',status:Math.random()<0.3?'in_progress':'open'});BP.set(bid,PROJECT_IDS[i%PROJECT_IDS.length]);}
    var STATUSES=['idle','dispatching','executing','blocked','gated'],SW=[0.35,0.10,0.35,0.08,0.07];
    function wRand(w){var r=Math.random(),a=0;for(var i=0;i<w.length;i++){a+=w[i];if(r<a)return i;}return w.length-1;}
    var ASSIGN=new Map();SHIPS.forEach(function(n){var bs=[];for(var j=0;j<(Math.random()<0.5?1:2);j++){var b=BEADS[Math.floor(Math.random()*BEADS.length)].id;if(bs.indexOf(b)<0)bs.push(b);}ASSIGN.set(n,bs);});
    var agentStates=new Map();
    function generateSnapshot(){
      var agents=SHIPS.map(function(n){var s=agentStates.get(n)||'idle';if(Math.random()<0.12)s=STATUSES[wRand(SW)];agentStates.set(n,s);return{agent:n,status:s,beads:ASSIGN.get(n)||[],project:AP.get(n)};});
      var total=agents.length,active=agents.filter(function(a){return a.status!=='idle';}).length;
      var blocked=agents.filter(function(a){return a.status==='blocked';}).length;
      var tp=Math.round(active*2.5+Math.random()*5);
      var rw=blocked>0?Math.round(blocked/active*100):0;
      return{timestamp:new Date().toISOString(),fleet:{total:total,active:active,agents:agents},
        beads:BEADS,bead_projects:Object.fromEntries(BP),
        metrics:{utilization:active/total,errorRate:blocked/Math.max(active,1),throughput:tp,rework:rw,queue:Math.round(8+Math.random()*10)}};
    }

    // =========================================
    // DATA -> GRAPH
    // =========================================
    var firstUpdate=true,layoutPending=false;
    function applySnapshot(snap){
      if(!snap||!cy)return;
      var m=snap.metrics||{};
      document.getElementById('m-throughput').textContent=String(m.throughput||0)+'/min';
      document.getElementById('m-rework').textContent=String(m.rework||0)+'%';
      document.getElementById('m-queue').textContent=String(m.queue||0);

      var toAdd=[];
      snap.fleet.agents.forEach(function(a){
        var id='a-'+a.agent.replace(/[^a-z0-9]/gi,'_'),color=AGENT_COLORS[a.status]||'#333',sz=a.status==='idle'?16:24;
        var ex=cy.getElementById(id);
        if(ex.length){ex.data('color',color);ex.data('size',sz);ex.data('status',a.status);}
        else{var pd=PROJECT_MAP.get(a.project),ap=pd?projectPosition(pd,W,H):{x:W/2,y:H/2};
          toAdd.push({data:{id:id,label:a.agent,type:'agent',color:color,size:sz,status:a.status,project:a.project},position:{x:ap.x+(Math.random()-0.5)*60,y:ap.y+(Math.random()-0.5)*60}});
          toAdd.push({data:{id:'anc-'+id,source:id,target:'anchor-'+a.project,type:'anchor',weight:8}});layoutPending=true;}
        (a.beads||[]).forEach(function(bid){var eid=id+'->'+bid;if(!cy.getElementById(eid).length)toAdd.push({data:{id:eid,source:id,target:bid,type:'works-on'}});});
      });
      var bp=snap.bead_projects||{};
      (snap.beads||[]).forEach(function(b){
        var color=b.status==='blocked'?'#e74c3c':b.status==='in_progress'?'#2ecc71':'#3498db';
        var sz=b.priority==='P0'?36:b.priority==='P1'?26:18,proj=bp[b.id]||'clavain';
        var ex=cy.getElementById(b.id);
        if(ex.length){ex.data('color',color);ex.data('size',sz);ex.data('status',b.status);}
        else{var pd=PROJECT_MAP.get(proj),ap=pd?projectPosition(pd,W,H):{x:W/2,y:H/2};
          toAdd.push({data:{id:b.id,label:b.id,type:'bead',color:color,size:sz,status:b.status,project:proj},position:{x:ap.x+(Math.random()-0.5)*40,y:ap.y+(Math.random()-0.5)*40}});
          toAdd.push({data:{id:'anc-'+b.id,source:b.id,target:'anchor-'+proj,type:'anchor',weight:5}});layoutPending=true;}
      });
      if(toAdd.length)cy.add(toAdd);
      if(layoutPending){
        var fixed=[];ALL_PROJECTS.forEach(function(p){fixed.push({nodeId:'anchor-'+p.id,position:projectPosition(p,W,H)});});
        var hf=false;try{var e=cytoscape.extensions();hf=!!(e&&e.layout&&e.layout.fcose);}catch(x){}
        cy.layout(hf?{name:'fcose',animate:false,randomize:firstUpdate,fixedNodeConstraint:fixed,nodeRepulsion:function(){return 4500;},idealEdgeLength:function(e){return e.data('type')==='anchor'?30:60;},edgeElasticity:function(e){return e.data('type')==='anchor'?0.8:0.1;},gravity:0.25,gravityRange:3.0,numIter:firstUpdate?250:100,padding:40,fit:firstUpdate}:{name:'cose',animate:false,randomize:firstUpdate,nodeRepulsion:function(){return 6000;},idealEdgeLength:function(){return 60;},gravity:0.4,numIter:250,padding:40,fit:firstUpdate}).run();
        layoutPending=false;firstUpdate=false;}
    }

    // =========================================
    // INIT
    // =========================================
    function init(){
      initGlowTextures();resizeGlow();createProjectLabels();updateProjectLabels();
      initCytoscape();initCLDPaths();
      var pipe=new DataPipe({generator:generateSnapshot,interval:4000,bufferSize:100});
      pipe.subscribe(applySnapshot);
      window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight;resizeGlow();cy.resize();updateProjectLabels();
        ALL_PROJECTS.forEach(function(p){var a=cy.getElementById('anchor-'+p.id);if(a.length)a.position(projectPosition(p,W,H));});});
      setTimeout(function(){resizeGlow();cy.resize();updateProjectLabels();pipe.start();requestAnimationFrame(animate);},400);
    }
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
    else setTimeout(init,100);
  </script>
</body>
