<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hydra Ambient Field</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #ccc;
      --dim: #555;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      height: 100vh;
    }
    canvas#hydra-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    .title { font-size: 16px; letter-spacing: 2px; color: rgba(255,255,255,0.4); }
    .metrics {
      display: flex;
      gap: 24px;
      font-size: 12px;
    }
    .metric .label {
      font-size: 10px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .metric .value {
      margin-top: 2px;
      color: rgba(255,255,255,0.6);
    }
    .bottom-bar {
      padding: 12px 24px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }
    .state-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .state-healthy  { color: rgba(46,204,113,0.7); }
    .state-busy     { color: rgba(241,196,15,0.7); }
    .state-degraded { color: rgba(243,156,18,0.7); }
    .state-critical { color: rgba(231,76,60,0.8); }
  </style>
</head>
<body>
  <canvas id="hydra-canvas" width="1280" height="720"></canvas>

  <div class="overlay">
    <div class="top-bar">
      <div class="title">AMBIENT FIELD</div>
      <div class="metrics">
        <div class="metric"><div class="label">Throughput</div><div class="value" id="m-throughput">0/min</div></div>
        <div class="metric"><div class="label">Utilization</div><div class="value" id="m-util">0%</div></div>
        <div class="metric"><div class="label">Error Rate</div><div class="value" id="m-error">0%</div></div>
        <div class="metric"><div class="label">Queue</div><div class="value" id="m-queue">0</div></div>
      </div>
    </div>
    <div class="bottom-bar">
      <div>
        <span class="state-label" id="state-label">HEALTHY</span>
      </div>
      <div id="data-info">MOCK DATA</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hydra-synth@1.3.29/dist/hydra-synth.js"></script>
  <script type="module">
    import { DataPipe } from '../data-static/data-pipe.js';

    // --- Hydra Init ---
    const canvas = document.getElementById('hydra-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const hydra = new Hydra({
      canvas,
      detectAudio: false,
      enableStreamCapture: false,
      width: canvas.width,
      height: canvas.height,
    });

    // --- Smooth Parameter System ---
    const params = {
      frequency: { current: 4, target: 4 },     // oscillator freq
      warmth: { current: 0, target: 0 },         // red shift (0=cool, 1=hot)
      turbulence: { current: 0.3, target: 0.3 }, // noise scale
      brightness: { current: 0.5, target: 0.5 }, // overall brightness
      speed: { current: 0.2, target: 0.2 },      // animation speed
    };

    function lerp(a, b, t) { return a + (b - a) * t; }

    // Interpolate params toward targets each frame
    const LERP_RATE = 0.03;  // ~2s convergence at 60fps
    function updateParams() {
      for (const p of Object.values(params)) {
        p.current = lerp(p.current, p.target, LERP_RATE);
      }
    }

    // Expose params as Hydra-accessible functions
    // Hydra evaluates these each frame via its functional reactive API
    window._freq = () => params.frequency.current;
    window._warmth = () => params.warmth.current;
    window._turb = () => params.turbulence.current;
    window._bright = () => params.brightness.current;
    window._speed = () => params.speed.current;

    // --- Visual States ---
    // Build the generative visual pipeline

    function setupVisual() {
      // Layer 1: base oscillator (frequency driven by throughput)
      osc(() => _freq(), () => _speed() * 0.1, 0.5)
        .color(
          () => 0.1 + _warmth() * 0.6,   // R increases with error rate
          () => 0.3 - _warmth() * 0.2,    // G decreases with error rate
          () => 0.6 - _warmth() * 0.4     // B decreases with error rate (cool -> warm)
        )
        .rotate(() => time * _speed() * 0.05)
        .modulate(
          noise(() => _turb() * 8, () => _speed() * 0.3),
          () => _turb() * 0.15
        )
        .brightness(() => _bright() * 0.6 - 0.2)
        .contrast(1.3)
        .out(o0);

      // Layer 2: subtle noise overlay for texture
      noise(() => 3 + _turb() * 5, () => _speed() * 0.2)
        .color(
          () => _warmth() * 0.3,
          () => 0.1,
          () => 0.2 * (1 - _warmth())
        )
        .brightness(-0.3)
        .out(o1);

      // Blend layers
      src(o0).blend(o1, 0.3).out(o2);
      render(o2);
    }

    // --- Mock Data ---
    const SHIPS = [
      'Mistake Not', 'Grey Area', 'Falling Outside', 'Sleeper Service',
      'Just Read Instr.', 'Still Love You', 'So Much Subtlety', 'No Gravitas',
    ];
    const STATUSES = ['idle', 'dispatching', 'executing', 'blocked', 'gated', 'shipped'];
    const STATUS_WEIGHTS = [0.40, 0.12, 0.28, 0.05, 0.08, 0.07];

    function weightedRandom(weights) {
      const r = Math.random(); let acc = 0;
      for (let i = 0; i < weights.length; i++) { acc += weights[i]; if (r < acc) return i; }
      return weights.length - 1;
    }

    let mockTick = 0;
    function generateMockSnapshot() {
      mockTick++;
      const agents = SHIPS.map(name => ({
        agent: name,
        status: STATUSES[weightedRandom(STATUS_WEIGHTS)],
      }));

      const total = agents.length;
      const active = agents.filter(a => a.status !== 'idle').length;
      const blocked = agents.filter(a => a.status === 'blocked').length;
      const shipped = agents.filter(a => a.status === 'shipped').length;
      const queueBase = 15 + 10 * Math.sin(mockTick * 0.1);

      return {
        timestamp: new Date().toISOString(),
        fleet: { total, active, agents },
        queue: { total: Math.round(queueBase + Math.random() * 5) },
        metrics: {
          throughput: shipped * 12,       // extrapolated per minute
          utilization: active / total,
          errorRate: blocked / Math.max(active, 1),
          queuePressure: queueBase / total,
        },
      };
    }

    // --- Data -> Visual Mapping ---

    function applySnapshot(snap) {
      if (!snap) return;
      const m = snap.metrics || {};

      // Map metrics to visual params
      params.frequency.target = 2 + (m.throughput || 0) * 0.3;  // faster with throughput
      params.warmth.target = Math.min(1, (m.errorRate || 0) * 3); // warm with errors
      params.turbulence.target = 0.2 + (m.queuePressure || 0) * 0.15; // noisy under pressure
      params.brightness.target = 0.3 + (m.utilization || 0) * 0.5; // bright when busy
      params.speed.target = 0.1 + (m.utilization || 0) * 0.4; // faster when active

      // Determine visual state
      const state = determineState(m);
      updateStateLabel(state);

      // Update metric display
      document.getElementById('m-throughput').textContent = `${Math.round(m.throughput || 0)}/min`;
      document.getElementById('m-util').textContent = `${Math.round((m.utilization || 0) * 100)}%`;
      document.getElementById('m-error').textContent = `${Math.round((m.errorRate || 0) * 100)}%`;
      document.getElementById('m-queue').textContent = String(snap.queue?.total || 0);
    }

    function determineState(m) {
      if ((m.errorRate || 0) > 0.3) return 'critical';
      if ((m.queuePressure || 0) > 1.5) return 'degraded';
      if ((m.utilization || 0) > 0.7) return 'busy';
      return 'healthy';
    }

    function updateStateLabel(state) {
      const el = document.getElementById('state-label');
      el.textContent = state.toUpperCase();
      el.className = `state-label state-${state}`;
    }

    // --- Param interpolation loop ---
    function tick() {
      updateParams();
      requestAnimationFrame(tick);
    }

    // --- Resize ---
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // --- Init ---
    setupVisual();
    requestAnimationFrame(tick);

    const pipe = new DataPipe({
      generator: () => generateMockSnapshot(),
      interval: 3000,
      bufferSize: 200,
    });
    pipe.subscribe(snap => applySnapshot(snap));
    pipe.start();
  </script>
</body>
</html>
